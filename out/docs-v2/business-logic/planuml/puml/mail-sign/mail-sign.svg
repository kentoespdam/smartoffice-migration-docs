direct/mail.php:395-419</title><defs/><g><g class="title" data-source-line="2"><text fill="#000000" font-family="Verdana" font-size="22" font-weight="bold" lengthAdjust="spacing" textLength="597.8994" x="70.8563" y="35.4209">signMe() + checkSign() &#8212; Verifikasi Cetak Surat</text><text fill="#000000" font-family="Verdana" font-size="22" font-weight="bold" lengthAdjust="spacing" textLength="298.7939" x="220.4091" y="61.0303">direct/mail.php:395-419</text></g><ellipse cx="368.7537" cy="87.2188" fill="#FFFFFF" rx="10" ry="10" style="stroke:#000000;stroke-width:1;"/><rect fill="#FFFFFF" height="33.9688" rx="12.5" ry="12.5" style="stroke:#000000;stroke-width:1;" width="254.2871" x="241.6101" y="117.2188"/><text fill="#000000" font-family="Verdana" font-size="12" lengthAdjust="spacing" textLength="234.2871" x="251.6101" y="138.3574">signMe() &#8212; Generate Verification Code</text><rect fill="#FFFFFF" height="33.9688" rx="12.5" ry="12.5" style="stroke:#000000;stroke-width:1;" width="165.1602" x="286.1736" y="171.1875"/><text fill="#000000" font-family="Verdana" font-size="12" lengthAdjust="spacing" textLength="145.1602" x="296.1736" y="192.3262">direct/mail.php:395-405</text><rect fill="#FFFFFF" height="33.9688" rx="12.5" ry="12.5" style="stroke:#000000;stroke-width:1;" width="227.6211" x="254.9431" y="225.1563"/><text fill="#000000" font-family="Verdana" font-size="12" lengthAdjust="spacing" textLength="207.6211" x="264.9431" y="246.2949">User mencetak surat (print action)</text><rect fill="#ADD8E6" height="311.3047" style="stroke:#000000;stroke-width:1;" width="479.2441" x="257.3679" y="269.125"/><path d="M410.3074,269.125 L410.3074,278.4219 L400.3074,288.4219 L257.3679,288.4219" fill="none" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="142.9395" x="260.3679" y="283.1201">Generate Auth Code</text><path d="M461.9382,298.4219 L461.9382,367.5195 L441.9382,371.5195 L461.9382,375.5195 L461.9382,444.6172 A0,0 0 0 0 461.9382,444.6172 L726.6121,444.6172 A0,0 0 0 0 726.6121,444.6172 L726.6121,308.4219 L716.6121,298.4219 L461.9382,298.4219 A0,0 0 0 0 461.9382,298.4219" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M716.6121,298.4219 L716.6121,308.4219 L726.6121,308.4219 L716.6121,298.4219" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="175.1572" x="467.9382" y="315.4888">PHP uniqid() menghasilkan</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="200.0464" x="467.9382" y="330.6216">unique ID berbasis timestamp.</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="170.2441" x="467.9382" y="345.7544">Contoh: "65f8a3b2e4d01"</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="4.1323" x="467.9382" y="360.8872">&#160;</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="11.6543" x="467.9382" y="376.02">&#9888;&#65039;</text><text fill="#000000" font-family="Verdana" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="59.2744" x="483.7249" y="376.02">Migrasi:</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="104.5776" x="547.1316" y="376.02">Ini bukan digital</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="210.4629" x="467.9382" y="391.1528">signature sesungguhnya. Hanya</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="147.145" x="467.9382" y="406.2856">print verification code.</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="195.7109" x="467.9382" y="421.4185">Di Spring Boot: gunakan UUID</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="243.6738" x="467.9382" y="436.5513">atau JWT untuk keamanan lebih baik.</text><rect fill="#FFFFFF" height="33.9688" rx="12.5" ry="12.5" style="stroke:#000000;stroke-width:1;" width="146.3691" x="295.5691" y="354.5352"/><text fill="#000000" font-family="Verdana" font-size="12" lengthAdjust="spacing" textLength="126.3691" x="305.5691" y="375.6738">auth_code = uniqid()</text><rect fill="#FFFFFF" height="103.8125" rx="12.5" ry="12.5" style="stroke:#000000;stroke-width:1;" width="202.7715" x="267.3679" y="464.6172"/><text fill="#000000" font-family="Verdana" font-size="12" lengthAdjust="spacing" textLength="103.7285" x="277.3679" y="485.7559">INSERT print_log:</text><text fill="#000000" font-family="Verdana" font-size="12" lengthAdjust="spacing" textLength="182.7715" x="277.3679" y="499.7246">- auth_code = generated code</text><text fill="#000000" font-family="Verdana" font-size="12" lengthAdjust="spacing" textLength="87.0117" x="277.3679" y="513.6934">- date = now()</text><text fill="#000000" font-family="Verdana" font-size="12" lengthAdjust="spacing" textLength="111.1523" x="277.3679" y="527.6621">- mail_id = id_mail</text><text fill="#000000" font-family="Verdana" font-size="12" lengthAdjust="spacing" textLength="176.7363" x="277.3679" y="541.6309">- username = user_full_name</text><text fill="#000000" font-family="Verdana" font-size="12" lengthAdjust="spacing" textLength="137.7363" x="277.3679" y="555.5996">- ip_address = client IP</text><path d="M481.8982,590.4297 L481.8982,614.1289 L461.8982,618.1289 L481.8982,622.1289 L481.8982,645.8281 A0,0 0 0 0 481.8982,645.8281 L710.1238,645.8281 A0,0 0 0 0 710.1238,645.8281 L710.1238,600.4297 L700.1238,590.4297 L481.8982,590.4297 A0,0 0 0 0 481.8982,590.4297" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M700.1238,590.4297 L700.1238,600.4297 L710.1238,600.4297 L700.1238,590.4297" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="149.8047" x="487.8982" y="607.4966">Code ini ditampilkan di</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="175.2969" x="487.8982" y="622.6294">hasil cetak surat (biasanya</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="207.2256" x="487.8982" y="637.7622">di footer atau sebagai QR code)</text><rect fill="#FFFFFF" height="33.9688" rx="12.5" ry="12.5" style="stroke:#000000;stroke-width:1;" width="186.2891" x="275.6091" y="601.1445"/><text fill="#000000" font-family="Verdana" font-size="12" lengthAdjust="spacing" textLength="166.2891" x="285.6091" y="622.2832">Return { code: auth_code }</text><ellipse cx="368.7537" cy="676.8281" fill="none" rx="11" ry="11" style="stroke:#000000;stroke-width:1;"/><ellipse cx="368.7537" cy="676.8281" fill="#FFFFFF" rx="6" ry="6" style="stroke:#000000;stroke-width:1;"/><rect fill="#FFFFFF" height="33.9688" rx="12.5" ry="12.5" style="stroke:#000000;stroke-width:1;" width="258.0957" x="239.7058" y="697.8281"/><text fill="#000000" font-family="Verdana" font-size="12" lengthAdjust="spacing" textLength="238.0957" x="249.7058" y="718.9668">checkSign() &#8212; Verify Printed Document</text><rect fill="#FFFFFF" height="33.9688" rx="12.5" ry="12.5" style="stroke:#000000;stroke-width:1;" width="165.1602" x="286.1736" y="751.7969"/><text fill="#000000" font-family="Verdana" font-size="12" lengthAdjust="spacing" textLength="145.1602" x="296.1736" y="772.9355">direct/mail.php:410-419</text><ellipse cx="368.7537" cy="815.7656" fill="#FFFFFF" rx="10" ry="10" style="stroke:#000000;stroke-width:1;"/><rect fill="#FFFFFF" height="33.9688" rx="12.5" ry="12.5" style="stroke:#000000;stroke-width:1;" width="242.8086" x="247.3494" y="845.7656"/><text fill="#000000" font-family="Verdana" font-size="12" lengthAdjust="spacing" textLength="222.8086" x="257.3494" y="866.9043">Input: key (auth_code dari do