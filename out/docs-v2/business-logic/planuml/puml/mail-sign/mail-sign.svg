xt><path d="M282.3906,1089.7852 L282.3906,1143.75 L262.3906,1147.75 L282.3906,1151.75 L282.3906,1205.7148 A0,0 0 0 0 282.3906,1205.7148 L513.9741,1205.7148 A0,0 0 0 0 513.9741,1205.7148 L513.9741,1099.7852 L503.9741,1089.7852 L282.3906,1089.7852 A0,0 0 0 0 282.3906,1089.7852" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M503.9741,1089.7852 L503.9741,1099.7852 L513.9741,1099.7852 L503.9741,1089.7852" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="161.5542" x="288.3906" y="1106.8521">Halaman ini bisa diakses</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="143.8188" x="288.3906" y="1121.9849">publik untuk verifikasi</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="162.7031" x="288.3906" y="1137.1177">keaslian dokumen cetak.</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="4.1323" x="288.3906" y="1152.2505">&#160;</text><text fill="#000000" font-family="Verdana" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="59.2744" x="288.3906" y="1167.3833">Migrasi:</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="47.0933" x="351.7974" y="1167.3833">Map ke</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="210.5835" x="288.3906" y="1182.5161">GET /api/mails/verify-sign/{key}</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="207.124" x="288.3906" y="1197.6489">Return JSON, bukan HTML view.</text><rect fill="#FFFFFF" height="131.75" rx="12.5" ry="12.5" style="stroke:#000000;stroke-width:1;" width="256.3906" x="6" y="1081.875"/><text fill="#000000" font-family="Verdana" font-size="12" lengthAdjust="spacing" textLength="204.4277" x="16" y="1103.0137">Rende