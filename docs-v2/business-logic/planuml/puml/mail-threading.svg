/><polygon fill="#000000" points="450.4405,247.125,440.4405,251.125,450.4405,255.125,446.4405,251.125" style="stroke:#000000;stroke-width:1;"/><line style="stroke:#000000;stroke-width:1;" x1="266.4796" x2="19" y1="251.125" y2="251.125"/><polygon fill="#000000" points="15,624.7222,19,634.7222,23,624.7222,19,628.7222" style="stroke:#000000;stroke-width:1;"/><line style="stroke:#000000;stroke-width:1;" x1="19" x2="19" y1="251.125" y2="1037.2769"/><line style="stroke:#000000;stroke-width:1;" x1="19" x2="353.46" y1="1037.2769" y2="1037.2769"/><line style="stroke:#000000;stroke-width:1;" x1="353.46" x2="353.46" y1="1037.2769" y2="1057.2769"/><polygon fill="#000000" points="349.46,1047.2769,353.46,1057.2769,357.46,1047.2769,353.46,1051.2769" style="stroke:#000000;stroke-width:1;"/><line style="stroke:#000000;stroke-width:1;" x1="353.46" x2="353.46" y1="219.125" y2="239.125"/><polygon fill="#000000" points="349.46,229.125,353.46,239.125,357.46,229.125,353.46,233.125" style="stroke:#000000;stroke-width:1;"/><line style="stroke:#000000;stroke-width:1;" x1="353.46" x2="353.46" y1="1091.2456" y2="1111.2456"/><polygon fill="#000000" points="349.46,1101.2456,353.46,1111.2456,357.46,1101.2456,353.46,1105.2456" style="stroke:#000000;stroke-width:1;"/><g class="legend" data-source-line="66"><rect fill="none" height="238.1563" rx="7.5" ry="7.5" style="stroke:#000000;stroke-width:1;" width="421.9883" x="739.761" y="1137.2456"/><text fill="#000000" font-family="Verdana" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="176.1758" x="744.761" y="1155.2407">find_node(&amp;dest, row)</text><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="180.2773" x="925.387" y="1155.2407">(direct/mail.php:257-281)</text><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="4.4502" x="744.761" y="1171.5376">&#160;</text><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="184.8574" x="744.761" y="1187.8345">Untuk setiap node di dest:</text><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="374.4932" x="744.761" y="1204.1313">1. Cek `m_root_id == row.m_root_id` (same thread?)</text><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="411.9883" x="744.761" y="1220.4282">2. Jika ya, cek `m_id == row.m_parent_id` (direct parent?)</text><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="345.2627" x="758.1116" y="1236.7251">&#8594; Jika ya: append row sebagai child, return TRUE</text><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="307.9727" x="758.1116" y="1253.022">&#8594; Jika tidak: recursive call pada `children[]`</text><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="360.9512" x="744.761" y="1269.3188">3. Jika root_id tidak match: skip ke node berikutnya</text><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="4.4502" x="744.761" y="1285.6157">&#160;</text><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="321.0703" x="744.761" y="1301.9126">Side effect: modifikasi dest in-place (`&amp;dest`)</text><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="4.4502" x="744.761" y="1318.2095">&#160;</text><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="359.1738" x="744.761" y="1334.5063">&#9888;&#65039; Bug potensial: fungsi tidak explicit return FALSE.</text><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="297.4316" x="744.761" y="1350.8032">Bergantung pada PHP implicit null &#8594; falsy.</text><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="328.9453" x="744.761" y="1367.1001">Di Spring Boot: pastikan `return false` explicit.</text></g><?plantuml-src ZLNDRYD54BxFKnHxGECG6no4WB6YY8HT0OgMAF6UTbTsURh6qqnFJzFTirdVEEqL2N7Yn6FmF7a1Ne7gxl4Vkq6SxEdvggk-hxwg-SZNr18OXL9dNdf5q6932wte3Qc5hosX896Fu1Eef1OBtGdYfuTVVeVdu-i0Wda4mTmImMKlbI3xIWjfgVIVjYZLnDIcE9j-FJxxQffbpgFrMLPyhqtl2wWKUa1hSGDT1G4E0Zs-qhdh1TOWvDXrriDg0-sYv4IUn88HD9hn9OASXtDu-HfoQetVWESYmflxMZALlDU-Ry2HbsZ0TlTyjy8Md2r781tacjxwS3xACe3YZkB3H15MVElyziNJMNWXAyZR1NgFPTsIzekVETFvENnsCGBMJqE-8JTY8DyXoqvVASVXJoYmUJBZSrAEYz7T8vXnkZf1MRbgcpJIQz796fhETNhzWOGtlQiZjOOWudFV6OZj6ntdJlYgwxNWrFjkXgZJgC8iOKBg27i_7O3kF86LwzeF1t1aZ1NPcWjMm49nIqZjK4ED1YrB21lKQ_1aS7iD4uztnyTjqQTRk9S26pQ3fxPlK0zacCuvz-4PAhN2ie5f0LTe9TnsdKz-vDUp7VQwOsMIfgJB00n5irT9hr6plop7BQH8nJbiSHSR90bley7sTNn884uqHzlNRBiLhb52oLuKgICmvMmXSRmhNuKxG7D596Ap7fKOu2O9uGmvMSbcK0G57c0yck7gDBZxGYS7g5ITOewkPvv2mWhliOw1UznHFuwSa-PYG1sxw_sMd1KmPzNJfZZinl-mxd-eSNj0ygT-ZNiv3fd-Q4qT6XktYlIHjv07WDGKWqgo4BnstAFyTtEv_RixufzXsp3dGCU1iLr9pd5JUKVTak-j7WYcNk_Mb6F2MQPe7R8bZYSd-t7wU3-Q9oUy3lwzKx_uCknKJlBYSC-5qD3L45naqmbSKGFBlRkvFM7BxGwMaBFNQP3pOfITJU07sI2FmIcKAVOmB8ra2amb3LDw4KVWuTrls_02q9X8ZPjyD0vCAiaIp7GK5HjPyEkojqw-8IY3h8Ox2yiOofbUlbvcdmz5Rbab0xJeoxe0rqWJN1Mbu9Kaczxh3MRPdUG3gYekke2s4s6KU5sbxaWzvWzXoPrSHkMNhEp37t_-_TUl_5rRWs4tQ2THyLUB1uUZKavwQvGifTzIUlRDzTtJINP9bhUA3oCMgx_vxWPaEq1rpwG2vmgLsqooRoNS6HjSUCby2evmNeRbi1mk3JXQxd9DWksIRx9_0000?></g></svg>