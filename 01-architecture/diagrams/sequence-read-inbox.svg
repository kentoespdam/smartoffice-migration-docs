nt-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="198" x="159.5" y="195.635">GET /api/v1/mails/folders/1/mails</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="247" x="159.5" y="213.3411">?page=0&amp;size=20&amp;sort=createdDate,desc</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="163" x="159.5" y="231.0471">{Authorization: Bearer JWT}</text><line style="stroke:#000000;stroke-width:1.0;" x1="423.5" x2="465.5" y1="268.5621" y2="268.5621"/><line style="stroke:#000000;stroke-width:1.0;" x1="465.5" x2="465.5" y1="268.5621" y2="281.5621"/><line style="stroke:#000000;stroke-width:1.0;" x1="424.5" x2="465.5" y1="281.5621" y2="281.5621"/><polygon fill="#000000" points="434.5,277.5621,424.5,281.5621,434.5,285.5621,430.5,281.5621" style="stroke:#000000;stroke-width:1.0;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="153" x="430.5" y="262.7531">Validate JWT via AppWrite</text><polygon fill="#000000" points="746.5,309.2681,756.5,313.2681,746.5,317.2681,750.5,313.2681" style="stroke:#000000;stroke-width:1.0;"/><line style="stroke:#000000;stroke-width:1.0;" x1="423.5" x2="752.5" y1="313.2681" y2="313.2681"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="311" x="430.5" y="307.4591">getMailsByFolder(userId, folderId=INBOX, pageable)</text><polygon fill="#000000" points="1042,405.9452,1052,409.9452,1042,413.9452,1046,409.9452" style="stroke:#000000;stroke-width:1.0;"/><line style="stroke:#000000;stroke-width:1.0;" x1="758.5" x2="1048" y1="409.9452" y2="409.9452"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="244" x="765.5" y="404.1362">findByUserIdAndFolderId(userId, INBOX)</text><path d="M1059,326.2681 L1059,477.2681 L1440,477.2681 L1440,336.2681 L1430,326.2681 L1059,326.2681 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1.0;"/><path d="M1430,326.2681 L1430,336.2681 L1440,336.2681 L1430,326.2681 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1.0;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="260" x="1065" y="345.1651">SELECT m.*, mc.mcat_code, mc.mcat_name,</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="170" x="1086" y="362.8711">ut.read_status, mt.mail_type</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="138" x="1065" y="380.5772">FROM sys_user_task ut</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="204" x="1065" y="398.2832">JOIN mail m ON m.m_id = ut.tm_id</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="360" x="1065" y="415.9892">LEFT JOIN mail_category mc ON mc.mcat_id = m.m_category</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="334" x="1065" y="433.6952">LEFT JOIN mail_type mt ON mt.mail_type_id = m.m_type</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="160" x="1065" y="451.4012">WHERE ut.user_id = :userId</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="161" x="1065" y="469.1072">AND ut.folder_id = :folderId</text><polygon fill="#000000" points="769.5,502.6223,759.5,506.6223,769.5,510.6223,765.5,506.6223" style="stroke:#000000;stroke-width:1.0;"/><line style="stroke:#000000;stroke-width:1.0;stroke-dasharray:2.0,2.0;" x1="763.5" x2="1053" y1="506.6223" y2="506.6223"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="142" x="775.5" y="500.8133">Page&lt;Mail&gt; (20 records)</text><path d="M620,519.6223 L620,617.6223 L896,617.6223 L896,529.6223 L886,519.6223 L620,519.6223 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1.0;"/><path d="M886,519.6223 L886,529.6223 L896,529.6223 L886,519.6223 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1.0;"/><text fill="#000000" font-family="Verdana" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="135" x="626" y="538.5193">Key Design Decision:</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="205" x="626" y="556.2253">m_created_by_name, m_to_str are</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="230" x="626" y="573.9313">denormalized &#8594; No HR API call needed</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="203" x="626" y="591.6373">for list view. Only call HR API when</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="255" x="626" y="609.3433">user needs live data (e.g., current position).</text><polygon fill="#000000" points="434.5,642.8584,424.5,646.8584,434.5,650.8584,430.5,646.8584" style="stroke:#000000;stroke-width:1.0;"/><line style="stroke:#000000;stroke-width:1.0;stroke-dasharray:2.0,2.0;" x1="428.5" x2="757.5" y1="646.8584" y2="646.8584"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="185" x="440.5" y="641.0494">Page&lt;MailSummaryResponse&gt;</text><polygon fill="#000000" points="163.5,692.2704,153.5,696.2704,163.5,700.2704,159.5,696.2704" style="stroke:#000000;stroke-width:1.0;"/><line style="stroke:#000000;stroke-width:1.0;stroke-dasharray:2.0,2.0;" x1="157.5" x2="422.5" y1="696.2704" y2="696.2704"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="42" x="169.5" y="672.7554">200 OK</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="239" x="169.5" y="690.4614">{content: [...], totalElements, totalPages}</text><polygon fill="#000000" points="39.5,723.9764,29.5,727.9764,39.5,731.976